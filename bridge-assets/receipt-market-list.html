<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="UTF-8">
  <title>{{label_market_list_title}}</title>
  <style>
    @page { margin: 0; }
    * { box-sizing: border-box; }
    body {
      font-family: {{font_family}};
      font-weight: 800;
      -webkit-font-smoothing: none;
      margin: 0;
      padding: 8px 16px 8px 8px;
      width: 72mm;
      color: #000;
      background: #fff;
      box-sizing: border-box;
      font-size: 12px;
    }
    .title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 6px 0 4px 0;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      font-size: 11px;
      color: #000;
      margin-bottom: 6px;
    }
    .divider {
      border-top: 1px dashed #000;
      margin: 8px 0;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 11px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 6px 0;
      table-layout: fixed;
    }
    th {
      border-bottom: 1px solid #000;
      padding: 6px 2px;
      text-align: left;
      font-size: 11px;
    }
    td {
      padding: 6px 2px;
      border-bottom: 1px dotted #000;
      word-break: break-all;
    }
    .center { text-align: center; }
    .right { text-align: right; }
    .checkbox-col { width: 10%; }
    .name-col { width: 45%; }
    .qty-col { width: 15%; }
    .price-col { width: 30%; }
    
    .item-supplier {
      font-size: 10px;
      color: #333;
      font-weight: normal;
      margin-top: 2px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="title">{{label_market_list_title}}</div>
  <div class="subtitle">{{batch_name}}</div>
  <div class="info-row">
    <span>{{label_print_datetime_prefix}}: {{print_datetime}}</span>
    <span>{{branch_name}}</span>
  </div>
  
  <div class="divider"></div>

  <table>
    <thead>
      <tr>
        <th class="checkbox-col center">{{label_confirm_col}}</th>
        <th class="name-col">{{label_item_col}}</th>
        <th class="qty-col center">{{label_qty}}</th>
        <th class="price-col right">{{label_amount_col}}</th>
      </tr>
    </thead>
    <tbody>
      {{items_html}}
    </tbody>
  </table>

  <div class="divider"></div>
  
</body>
</html>
