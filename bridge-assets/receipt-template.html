<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>영수증</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
    @page { margin: 0; }
    * { box-sizing: border-box; }
    body { font-weight: 800; -webkit-font-smoothing: none; 
      font-family: 'Noto Sans KR', sans-serif;
      margin: 0 auto;
      padding: 8px 2mm;
      width: 74mm; /* 80mm 영수증 기준 */
      color: #000;
      background: #fff;
    }
    .receipt-container {
      width: 100%;
      border: 1px dashed #000;
      padding: 15px;
      box-sizing: border-box;
    }
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }
    .header p {
      margin: 5px 0 0 0;
      font-size: 14px;
    }
    .divider {
      border-top: 1px dashed #000;
      margin: 15px 0;
    }
    .info-section {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 15px;
    }
    .info-section p {
      margin: 2px 0;
    }
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .items-table th {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 8px 0;
      text-align: left;
    }
    .items-table td {
      padding: 6px 0;
    }
    .items-table .qty {
      text-align: center;
    }
    .items-table .price {
      text-align: right;
    }
    .summary-section {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
      text-align: right;
    }
    .message-section {
      margin-top: 15px;
      padding: 10px;
      background-color: #f9f9f9;
      border: 1px dotted #000;
      font-size: 14px;
    }
    .footer {
      text-align: center;
      margin-top: 25px;
      font-size: 12px;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="receipt-container">
    <div class="header">
      <div style="position: relative; margin-bottom: 5px;">
        <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; align-items: center; font-size: 11px; font-weight: normal;">
          <input type="checkbox" style="margin:0 3px 0 0; width: 14px; height: 14px;"> 제작완료
        </div>
        <h1>{{title}} <span style="font-size:14px; color:#000; font-weight:bold;">(#{{short_order_id}})</span></h1>
      </div>
      <p>출력일시: {{date}}</p>
    </div>
    
    <div class="info-section">
      {{orderer_html}}
      {{pickup_delivery_html}}
    </div>
    
    <div class="divider"></div>
    
    <table class="items-table">
      <thead>
        <tr>
          <th>상품명</th>
          <th class="qty">수량</th>
          <th class="price">금액</th>
        </tr>
      </thead>
      <tbody>
        {{items_html}}
      </tbody>
    </table>
    
    <div class="divider"></div>
    
    <div class="summary-section">
      {{summary_html}}
    </div>
    
    {{message_html}}
  </div>
</body>
</html>
