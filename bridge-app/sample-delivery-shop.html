<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>주문서</title>
  <style>
    @page { margin: 0; }
    body {
      font-family: 'Malgun Gothic', sans-serif;
      margin: 0;
      padding: 8px 10px;
      width: 72mm;
      color: #000;
      background: #fff;
      font-size: 12px;
    }
    .title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 6px 0 10px 0;
      letter-spacing: 1px;
    }
    .divider {
      border-top: 1px dashed #000;
      margin: 8px 0;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
      font-size: 12px;
    }
    .label { color: #555; }
    .value { font-weight: bold; text-align: right; max-width: 60%; }
    .recipient-block {
      margin: 6px 0;
    }
    .recipient-name {
      font-size: 20px;
      font-weight: bold;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 4px 0;
    }
    th {
      border-bottom: 1px solid #000;
      padding: 4px 2px;
      text-align: left;
      font-size: 11px;
    }
    td {
      padding: 4px 2px;
      border-bottom: 1px dotted #ccc;
    }
    td.right { text-align: right; }
    .summary {
      text-align: right;
      font-size: 13px;
      margin: 4px 0;
    }
    .summary .total {
      font-size: 15px;
      font-weight: bold;
    }
    .request-box {
      font-size: 12px;
      margin: 6px 0;
      padding: 4px 0;
    }
    .footer {
      text-align: center;
      font-size: 11px;
      color: #555;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div style="position: relative; margin: 6px 0 8px 0;">
    <div style="position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; align-items: center; font-size: 11px; font-weight: normal;">
      <input type="checkbox" style="margin:0 3px 0 0; width: 13px; height: 13px;"> 제작완료
    </div>
    <div class="title" style="margin: 0;">주문서 <span style="font-size:12px; color:#666; font-weight:normal;">(#abcd1234)</span></div>
  </div>
  <div style="text-align:center; font-size:11px; color:#555; margin-bottom:6px;">출력일시: 2026-05-24 08:45:00</div>
  <div class="divider"></div>

  <div class="row">
    <span class="label">주문자</span>
    <span class="value">홍길동 010-1234-5678</span>
  </div>
  <div class="row" style="font-size: 15px; margin: 8px 0; align-items: center;">
    <span class="label">수령인</span>
    <span class="value">이영희 010-9876-6666</span>
  </div>
  <div class="row" style="font-size: 15px; margin: 8px 0; align-items: center;">
    <span class="label">배송일시</span>
    <span class="value">05/24 (일) 14:00</span>
  </div>
  <div class="row" style="font-size: 15px; margin: 8px 0; align-items: flex-start;">
    <span class="label" style="min-width: 45px;">배송지</span>
    <span class="value" style="word-break: keep-all; line-height: 1.4;">강남구 테헤란로 123, 4층</span>
  </div>

  <div class="divider"></div>

  <table>
    <thead>
      <tr>
        <th>상품명</th>
        <th style="text-align:center;">수량</th>
        <th style="text-align:right;">금액</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>빨간 장미 다발</td><td style="text-align:center;">1</td><td class="right">50,000</td></tr><tr><td>축하 카드</td><td style="text-align:center;">1</td><td class="right">2,000</td></tr>
    </tbody>
  </table>

  <div class="divider"></div>

  <div class="summary">
    <div>주문금액 52,000원</div>
    <div>배송비 5,000원</div>
    <div class="total">합계 57,000원</div>
  </div>

  <div class="request-box"><b>요청사항:</b> 배송 전 연락주세요</div>
  <div class="request-box" style="margin-top: 10px; border-top: 1px dashed #000; padding-top: 10px;"><b>메시지:</b><br/>생일 축하합니다! 항상 건강하고 행복하세요.<br/>보내는분: 홍길동</div>

</body>
</html>
