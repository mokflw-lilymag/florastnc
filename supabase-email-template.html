<div style="font-family: 'Pretendard', -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px; background-color: #ffffff; border-radius: 12px; border: 1px solid #f1f5f9;">
  <div style="text-align: center; margin-bottom: 30px;">
    <!-- 플로싱크 로고 -->
    <img src="https://floxync.com/images/floxync-logo-dark.png" alt="Floxync Logo" style="height: 48px; object-fit: contain;">
  </div>
  
  <h2 style="color: #0f172a; font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 24px;">
    비밀번호 재설정 안내
  </h2>
  
  <p style="color: #475569; font-size: 16px; line-height: 1.6; margin-bottom: 24px; text-align: center;">
    안녕하세요! 플로비서(플로싱크)입니다. 🌸<br><br>
    계정의 비밀번호 재설정 요청이 접수되었습니다.<br>
    아래 버튼을 클릭하여 새로운 비밀번호를 설정해 주세요.
  </p>
  
  <div style="text-align: center; margin: 40px 0;">
    <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 16px 32px; background-color: #0f172a; color: #ffffff; text-decoration: none; border-radius: 100px; font-weight: 600; font-size: 16px;">
      비밀번호 재설정하기
    </a>
  </div>
  
  <p style="color: #94a3b8; font-size: 14px; line-height: 1.5; text-align: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid #e2e8f0;">
    본인이 요청하지 않으셨다면 이 메일을 무시하시거나 비밀번호를 즉시 변경해 주세요.<br>
    감사합니다.
  </p>
</div>
