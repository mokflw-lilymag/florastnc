# Postiz self-hosted (Phase 2)
# Usage: copy .env.example → .env, then `docker compose up -d`
# Docs: https://docs.postiz.com/

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    restart: unless-stopped
    ports:
      - "4200:5000"
    environment:
      MAIN_URL: ${POSTIZ_MAIN_URL:-http://localhost:4200}
      FRONTEND_URL: ${POSTIZ_MAIN_URL:-http://localhost:4200}
      NEXT_PUBLIC_BACKEND_URL: ${POSTIZ_MAIN_URL:-http://localhost:4200}
      JWT_SECRET: ${POSTIZ_JWT_SECRET:-change-me-in-production}
      DATABASE_URL: postgresql://postiz:postiz@postiz-db:5432/postiz
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:5000
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
    depends_on:
      - postiz-db
      - postiz-redis

  postiz-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: postiz
      POSTGRES_DB: postiz
    volumes:
      - postiz_pg:/var/lib/postgresql/data

  postiz-redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postiz_pg:
