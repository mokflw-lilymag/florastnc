<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap');
    @page { margin: 0; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      font-weight: 800;
      -webkit-font-smoothing: none;
      margin: 0;
      padding: 8px 16px 8px 8px;
      width: 72mm;
      color: #000;
      background: #fff;
      font-size: 11px;
    }
    .receipt-container {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #000;
      padding: 10px;
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 4px;
      border-bottom: 2px double #000;
      padding-bottom: 4px;
    }
    .divider {
      border-top: 1px dashed #000;
      margin: 8px 0;
    }
    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    .info-table td {
      border: 1px solid #000;
      padding: 4px 6px;
    }
    .info-table .label {
      background-color: #f0f0f0;
      font-weight: bold;
      width: 60px;
    }
    .items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    .items-table th {
      border-top: 1px solid #000;
      border-bottom: 1px solid #000;
      padding: 5px 0;
      text-align: left;
    }
    .items-table td {
      border-bottom: 1px dotted #000;
      padding: 4px 0;
    }
    .items-table .qty {
      text-align: center;
      width: 30px;
    }
    .items-table .price {
      text-align: right;
      width: 80px;
    }
    .supplier-box {
      border: 1px solid #000;
      padding: 6px;
      font-size: 10px;
      line-height: 1.4;
      margin-top: 10px;
    }
    .supplier-title {
      font-weight: bold;
      border-bottom: 1px solid #000;
      margin-bottom: 4px;
      padding-bottom: 2px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="receipt-container">
    <div class="header">
      <h1>간이영수증</h1>
    </div>
    
    <table class="info-table">
      <tr>
        <td class="label">공급받는자</td>
        <td>{{customer_name}} 귀하</td>
      </tr>
      <tr>
        <td class="label">금액</td>
        <td style="font-weight: bold; font-size: 12px;">
          일금 {{total_amount_korean}}원 정<br/>
          (￦{{total_amount_formatted}}-)
        </td>
      </tr>
    </table>
    
    <div style="font-weight: bold; margin-bottom: 4px;">품목 명세:</div>
    <table class="items-table">
      <thead>
        <tr>
          <th>품목</th>
          <th class="qty">수량</th>
          <th class="price">금액</th>
        </tr>
      </thead>
      <tbody>
        {{items_html}}
      </tbody>
    </table>
    
    <div class="supplier-box">
      <div class="supplier-title">공급자 정보</div>
      <div>상호: {{branch_name}} (대표: {{branch_manager}})</div>
      <div>등록번호: {{branch_biz_number}}</div>
      <div>주소: {{branch_address}}</div>
    </div>
    
    <p style="text-align: center; font-weight: bold; margin: 15px 0 5px 0; font-size: 12px; letter-spacing: 2px;">위 금액을 영수함.</p>
    <div style="text-align: right; font-size: 9px; color: #555;">작성일: {{order_date}}</div>
  </div>
</body>
</html>
